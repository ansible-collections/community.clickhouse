- name: Create row policy {{ _test_case.name }}
  community.clickhouse.clickhouse_row_policy:
    name: "{{ _test_case.name | default(omit) }}"
    database: "{{ _test_case.database | default(omit) }}"
    table: "{{ _test_case.table | default(omit) }}"
    using: "{{ _test_case.using | default(omit) }}"
    restrictive: "{{ _test_case.restrictive | default(omit) }}"
    apply_to: "{{ _test_case.apply_to | default(omit) }}"
    apply_to_all: "{{ _test_case.apply_to_all | default(omit) }}"
    apply_to_except: "{{ _test_case.apply_to_except | default(omit) }}"
    cluster: "{{ _test_case.cluster | default(omit) }}"
  register: result

- name: Check the return values {{ _test_case.name }}
  ansible.builtin.assert:
    that:
      - result.changed == true
      - result.executed_statements[0] == _test_case.__expected_query

- name: Create row policy {{ _test_case.name }} - idempotency test 
  community.clickhouse.clickhouse_row_policy:
