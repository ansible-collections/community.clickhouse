- name: Check the row policy {{ _test_case.name }} is dropped
  community.clickhouse.clickhouse_client:
    execute: "SELECT 1 FROM system.row_policies WHERE short_name = '{{ _test_case.name }}' AND database = '{{ _test_case.database }}' AND table = '{{ _test_case.table | default('') }}'"
  register: result

- name: Check the return values {{ _test_case.name }}
  ansible.builtin.assert:
    that:
      - result.result == []

